id: android
title: Android 开发路线图
description: 从 Kotlin、Android Studio 与 Jetpack Compose 出发，逐步构建、测试并通过 Google Play 发布一款可维护的原生 Android 应用。
tags:
  - 移动端
  - Android
  - Kotlin
  - Jetpack Compose
nodes:
  - type: node
    id: prepare-android-workflow
    title: 建立 Android 开发工作流
    description: 配置 Android Studio、SDK 和运行设备，理解项目结构与构建变体，并能创建和运行首个应用。!!!
    tags:
      - Android Studio
      - 入门
    link: https://developer.android.com/courses/android-basics-compose/course
    children:
      - type: node
        id: navigate-android-project
        title: 使用 Android Studio 管理项目
        description: 能定位源码、资源、Manifest、模块和 Gradle 脚本，并使用导航、重构和代码检查完成日常开发。
        tags:
          - Android Studio
      - type: node
        id: run-emulator-device
        title: 在模拟器与真机上运行应用
        description: 创建不同配置的虚拟设备、连接真实设备并使用 adb，说明两类环境在硬件与性能验证上的差异。
        tags:
          - 模拟器
          - adb
      - type: node
        id: understand-build-variants
        title: 区分模块、构建类型与变体
        description: 理解 applicationId、namespace、minSdk、targetSdk、Build Type 和 Product Flavor 对产物与运行行为的影响。
        tags:
          - Gradle
          - 构建
      - type: node
        id: use-git-from-start
        title: 用 Git 保存可回退的开发历史
        description: 忽略构建产物、本地 SDK 路径和签名秘密，以小步提交记录功能、配置与资源变更。
        tags:
          - Git
          - 工程化
  - type: node
    id: build-kotlin-foundation
    title: 建立 Kotlin 编程基础
    description: 使用 Kotlin 的类型系统、函数、集合和面向对象能力表达可靠的应用逻辑，并能阅读常见编译诊断。
    tags:
      - Kotlin
      - 语言基础
    link: https://kotlinlang.org/docs/basic-syntax.html
    children:
      - type: node
        id: model-values-control-flow
        title: 用类型与控制流建模数据
        description: 正确使用 val、var、基本类型、集合、区间、when 和智能类型转换表达业务状态。
        tags:
          - 类型系统
      - type: node
        id: handle-nullability-safely
        title: 用类型系统处理可空数据
        description: 使用安全调用、Elvis、作用域函数和明确分支消除不必要的非空断言，并区分缺失与失败。
        tags:
          - 空安全
        link: https://kotlinlang.org/docs/null-safety.html
      - type: node
        id: compose-functions-lambdas
        title: 用函数、Lambda 与集合操作组合行为
        description: 设计清晰的参数和返回值，并用高阶函数、扩展函数与集合变换减少重复控制流。
        tags:
          - 函数式编程
      - type: node
        id: design-classes-interfaces
        title: 用数据类、密封类型和接口设计模型
        description: 根据不可变值、状态分支和行为契约选择 data class、sealed interface、object、class 与泛型。
        tags:
          - 类型建模
      - type: node
        id: understand-java-interoperability
        title: 读懂 Kotlin 与 Java 互操作边界
        description: 能调用 Java API、处理平台类型和 SAM 转换，并识别旧项目或第三方库带来的空安全差异。
        tags:
          - Java
          - 互操作
      - type: node
        id: practice-kotlin-domain-model
        title: 完成一个纯 Kotlin 领域模型练习
        description: 为待办、记账或内容收藏场景实现模型、校验、排序和错误路径，并用测试验证边界输入。
        tags:
          - 实践
  - type: node
    id: apply-coroutines-flow
    title: 使用 Coroutines 与 Flow 编排异步数据
    description: 构建可取消、生命周期感知且不阻塞主线程的异步流程，并用 Flow 表达持续变化的数据。
    tags:
      - Coroutines
      - Flow
      - 异步
    link: https://developer.android.com/kotlin/coroutines/coroutines-best-practices
    children:
      - type: node
        id: structure-suspending-work
        title: 用挂起函数组织异步工作
        description: 区分顺序与并发执行，选择合适的 Dispatcher，并让数据层 API 保持从主线程调用安全。
        tags:
          - suspend
          - Dispatcher
      - type: node
        id: control-coroutine-lifecycle
        title: 管理协程作用域、异常与取消
        description: 使用结构化并发传播失败和取消，避免 GlobalScope、泄漏任务以及吞掉 CancellationException。
        tags:
          - CoroutineScope
          - 取消
      - type: node
        id: expose-reactive-streams
        title: 用 Flow 暴露响应式数据
        description: 根据冷流、StateFlow 和 SharedFlow 的语义组合、变换与共享数据，并处理背压和重复订阅成本。
        tags:
          - StateFlow
          - 响应式
      - type: node
        id: collect-with-lifecycle
        title: 按生命周期安全收集状态
        description: 在 ViewModel 作用域生产状态，在 Compose 中按 Lifecycle 收集，避免不可见界面继续执行无用工作。
        tags:
          - Lifecycle
          - ViewModel
  - type: node
    id: compose-android-interface
    title: 用 Jetpack Compose 构建界面
    description: 从小型 Composable 组合页面，以状态驱动渲染，并完成输入、列表、主题与动画等常见交互。
    tags:
      - Jetpack Compose
      - UI
    link: https://developer.android.com/develop/ui/compose/documentation
    children:
      - type: node
        id: compose-layout-components
        title: 组合 Composable 与布局
        description: 使用 Modifier、Row、Column、Box、Lazy 列表和 Material 组件构建可复用页面，并理解约束传递。
        tags:
          - 布局
          - Material
      - type: node
        id: manage-compose-state
        title: 提升状态并保持单一数据源
        description: 区分 remember、可保存状态和屏幕状态，通过状态下发与事件上送避免重复或失步的数据。
        tags:
          - 状态管理
          - UDF
        link: https://developer.android.com/develop/ui/compose/state
      - type: node
        id: control-recomposition-effects
        title: 控制重组与副作用
        description: 理解稳定性和重组范围，根据生命周期选择 LaunchedEffect、DisposableEffect 与派生状态，避免在组合阶段执行副作用。
        tags:
          - 重组
          - Side Effects
      - type: node
        id: build-forms-input
        title: 构建可校验的输入流程
        description: 管理文本、焦点、键盘、提交和错误提示，使编辑状态能跨重组与必要的配置变更保持一致。
        tags:
          - 表单
          - 交互
      - type: node
        id: theme-animate-interface
        title: 建立主题并解释状态变化
        description: 统一颜色、排版、形状和深色模式，为插入、删除、转场与手势添加克制且可关闭的动画。
        tags:
          - 主题
          - 动画
  - type: node
    id: create-adaptive-navigation
    title: 构建自适应、可导航的 Android 体验
    description: 根据窗口尺寸和系统环境调整布局，维护可恢复导航，并让关键任务能够被辅助技术完成。
    tags:
      - 自适应
      - 导航
      - 无障碍
    children:
      - type: node
        id: implement-navigation-compose
        title: 实现类型安全的页面导航
        description: 用 Navigation Compose 表达目的地、参数、返回栈和深链接，避免在页面之间传递大型或可变对象。
        tags:
          - Navigation Compose
          - 深链接
        link: https://developer.android.com/develop/ui/compose/navigation
      - type: node
        id: preserve-state-process-death
        title: 跨配置变化和进程重建恢复状态
        description: 区分瞬时 UI 状态、SavedStateHandle 和持久化数据，并验证旋转、后台回收和深链接启动后的恢复行为。
        tags:
          - 状态恢复
          - 生命周期
      - type: node
        id: adapt-window-sizes
        title: 适配手机、平板与可折叠设备
        description: 按窗口尺寸类别选择单栏、列表详情或多窗格布局，并处理方向、分屏、铰链和输入方式变化。
        tags:
          - 大屏
          - 可折叠设备
        link: https://developer.android.com/develop/ui/compose/layouts/adaptive
      - type: node
        id: support-accessible-interaction
        title: 让关键流程可被辅助技术操作
        description: 提供正确语义、遍历顺序、点击目标、对比度和非颜色提示，并用 TalkBack 与自动化检查验证。
        tags:
          - TalkBack
          - 可访问性
        link: https://developer.android.com/develop/ui/compose/accessibility
      - type: node
        id: localize-content-formats
        title: 本地化文本与区域格式
        description: 使用字符串资源、复数规则和 Locale 感知格式处理文本、日期与数字，并验证从右到左布局和文本扩展。
        tags:
          - 本地化
          - 国际化
  - type: node
    id: connect-data-services
    title: 连接网络与本地数据
    description: 通过 Repository 协调远程和本地数据源，明确加载与失败状态，并为弱网、离线和进程退出提供可靠体验。
    tags:
      - 网络
      - 数据
      - 离线
    link: https://developer.android.com/topic/architecture/data-layer
    children:
      - type: node
        id: fetch-validate-network-data
        title: 获取并验证远程数据
        description: 通过可替换的 HTTP 客户端构造请求、检查响应、解析序列化模型，并处理超时、取消、鉴权和服务端错误。
        tags:
          - HTTP
          - 序列化
      - type: node
        id: model-loading-failure-states
        title: 显式建模加载、空结果与失败状态
        description: 让界面针对进行中、无数据、可重试错误和已有缓存分别提供稳定、可测试且不会闪烁的反馈。
        tags:
          - 错误处理
          - UX
      - type: node
        id: persist-structured-data-room
        title: 用 Room 持久化结构化数据
        description: 设计 Entity、关系、DAO、事务和迁移，并以 Flow 暴露查询结果和验证数据库升级路径。
        tags:
          - Room
          - SQLite
        link: https://developer.android.com/training/data-storage/room
      - type: node
        id: persist-preferences-datastore
        title: 用 DataStore 保存偏好与小型状态
        description: 根据键值或类型化数据选择 Preferences 与 Proto DataStore，并处理读取失败、迁移和并发更新。
        tags:
          - DataStore
          - 偏好
        link: https://developer.android.com/topic/libraries/architecture/datastore
      - type: node
        id: design-offline-first-sync
        title: 设计本地优先的数据同步
        description: 以本地数据源作为读取真相，定义新鲜度、写入队列、重试和冲突策略，使核心流程在断网时仍可用。
        tags:
          - Offline First
          - 同步
        link: https://developer.android.com/topic/architecture/data-layer/offline-first
  - type: node
    id: structure-maintainable-app
    title: 组织可维护的应用架构与构建
    description: 按功能和依赖边界拆分 UI、领域逻辑与数据访问，使变化可定位、实现可替换、核心行为可测试。
    tags:
      - 架构
      - Gradle
      - 工程化
    link: https://developer.android.com/topic/architecture/recommendations
    children:
      - type: node
        id: apply-unidirectional-data-flow
        title: 用单向数据流连接 UI 与 ViewModel
        description: 让 ViewModel 暴露不可变 UI State 并接收用户事件，将业务逻辑和异步副作用移出 Composable。
        tags:
          - ViewModel
          - UDF
      - type: node
        id: separate-layer-responsibilities
        title: 分离 UI、领域与数据层职责
        description: 仅在复杂业务确有复用价值时加入 Use Case，并让 Repository 成为上层访问数据源的唯一入口。
        tags:
          - 分层
          - Repository
      - type: node
        id: inject-external-dependencies
        title: 显式注入外部依赖
        description: 为网络、数据库、时钟和系统服务定义清晰构造边界，按项目规模选择手工或框架化依赖注入。
        tags:
          - 依赖注入
          - 可测试性
      - type: node
        id: modularize-by-benefit
        title: 按收益拆分 Gradle 模块
        description: 当团队协作、构建时间或功能边界需要时再拆模块，并保持依赖方向、资源可见性和公共 API 清晰。
        tags:
          - 模块化
          - 构建性能
        link: https://developer.android.com/topic/modularization
      - type: node
        id: manage-dependencies-config
        title: 集中管理依赖与环境配置
        description: 使用 Version Catalog、Build Configuration 和 CI 密钥区分环境，固定兼容范围且不把秘密打入源码仓库。
        tags:
          - Version Catalog
          - 配置
      - type: roadmap
        roadmapId: gradle
        title: 按需深化通用 Gradle 构建能力
        description: 在需要自定义任务、依赖诊断或大型多模块优化时，系统学习 Gradle 的任务图与构建模型。
  - type: node
    id: integrate-platform-capabilities
    title: 按需集成系统能力并保护隐私
    description: 根据真实产品价值选择通知、位置、媒体等平台能力，只申请最小权限并遵守后台与资源限制。
    tags:
      - 系统 API
      - 隐私
      - 后台任务
    children:
      - type: node
        id: request-minimum-permissions
        title: 在恰当时机请求最小权限
        description: 优先使用无需权限的系统入口，在功能即将使用时解释价值并请求权限，为拒绝、受限和永久拒绝提供路径。
        tags:
          - 运行时权限
          - 隐私
        link: https://developer.android.com/privacy-and-security/minimize-permission-requests
      - type: node
        id: protect-sensitive-data
        title: 保护传输、存储与日志中的敏感数据
        description: 使用 TLS、系统密钥能力和私有存储，收紧导出组件与 Intent 输入，并避免记录令牌或个人数据。
        tags:
          - 安全
          - 数据保护
        link: https://developer.android.com/privacy-and-security/security-best-practices
      - type: node
        id: schedule-deferrable-work
        title: 用 WorkManager 调度可延迟的可靠工作
        description: 为同步、上传等任务设置唯一工作、约束、重试和幂等语义，不把即时交互或永久循环塞入后台调度。
        tags:
          - WorkManager
          - 后台任务
        link: https://developer.android.com/topic/libraries/architecture/workmanager
      - type: node
        id: add-notifications-links
        title: 按产品需要接入通知与应用链接
        description: 设计通知渠道、权限和点击去向，并验证冷启动、重复 Intent、深链接校验和用户关闭通知后的行为。
        tags:
          - 通知
          - App Links
        status: optional
      - type: node
        id: add-device-frameworks
        title: 按产品需要接入设备框架
        description: 为相机、媒体、地图、健康或蓝牙选择官方 API，并在不同厂商真机验证能力、权限和生命周期差异。
        tags:
          - 硬件
          - 设备兼容
        status: optional
  - type: node
    id: verify-debug-optimize
    title: 用测试、调试与测量守住质量
    description: 建立从快速逻辑测试到关键用户流程验证的反馈链，并用工具证据修复崩溃、ANR、卡顿和资源问题。
    tags:
      - 测试
      - 调试
      - 性能
    link: https://developer.android.com/training/testing/fundamentals
    children:
      - type: node
        id: test-domain-viewmodels
        title: 在本地测试领域逻辑与 ViewModel
        description: 对状态转换、边界输入、错误路径和协程流程编写快速、隔离且使用受控调度器的单元测试。
        tags:
          - JUnit
          - 单元测试
      - type: node
        id: test-compose-ui
        title: 验证 Compose 组件与关键流程
        description: 用语义查询、测试规则和可替换依赖覆盖组件行为，并以少量设备测试验证导航和端到端任务。
        tags:
          - Compose Testing
          - 仪器测试
        link: https://developer.android.com/develop/ui/compose/testing
      - type: node
        id: debug-with-studio-tools
        title: 用 Android Studio 工具定位运行时问题
        description: 结合 Logcat、断点、Layout Inspector、Network Inspector、StrictMode 和崩溃堆栈复现并缩小问题范围。
        tags:
          - Logcat
          - 调试
      - type: node
        id: profile-real-devices
        title: 在代表性真机上测量性能
        description: 用 Profiler、Perfetto 和 Macrobenchmark 测量启动、帧、CPU、内存与能耗，建立基线后验证单一优化效果。
        tags:
          - Profiler
          - Macrobenchmark
        link: https://developer.android.com/studio/profile/
      - type: node
        id: optimize-critical-journeys
        title: 为关键用户路径生成 Baseline Profile
        description: 覆盖启动、导航和高频滚动流程，在发布构建上基准测试 Profile 的实际收益并自动重新生成。
        tags:
          - Baseline Profile
          - 启动性能
        link: https://developer.android.com/topic/performance/baselineprofiles/overview
      - type: node
        id: automate-ci-checks
        title: 在持续集成中执行质量检查
        description: 对每次变更运行静态检查、构建和核心测试，保存报告与可追踪产物，阻止已知回归进入发布分支。
        tags:
          - CI
          - Lint
  - type: node
    id: deliver-capstone-app
    title: 交付一款可验证的综合应用
    description: 将界面、数据、并发、质量与隐私能力组合成可供真实用户试用的完整产品切片。
    tags:
      - 综合实践
      - 作品集
    children:
      - type: node
        id: define-capstone-scope
        title: 定义一个可在数周内完成的产品范围
        description: 选择内容收藏、习惯追踪或轻量协作等场景，写清目标用户、三条核心流程和可验收的非功能要求。
        tags:
          - 需求
          - 规划
      - type: node
        id: build-vertical-slices
        title: 按垂直切片迭代核心流程
        description: 逐条打通 Compose、ViewModel、Repository、网络或持久化和错误恢复，每个切片保持可运行与可测试。
        tags:
          - 迭代开发
      - type: node
        id: validate-device-matrix
        title: 在设备矩阵上完成发布候选验收
        description: 覆盖离线、权限拒绝、深色模式、大字体、TalkBack、低内存、进程重建和不同窗口尺寸并修复阻断问题。
        tags:
          - 验收
          - 兼容性
      - type: node
        id: document-decisions-usage
        title: 记录使用方式与关键工程决策
        description: 提供可复现的构建步骤、功能演示、架构边界和已知限制，使他人能够运行、评审并继续维护项目。
        tags:
          - 文档
          - 作品集
  - type: node
    id: release-operate-app
    title: 发布并持续运营 Android 应用
    description: 管理签名、版本、测试轨道与商店材料，完成 Google Play 发布并依据线上质量指标安全迭代。
    tags:
      - 发布
      - Google Play
    link: https://support.google.com/googleplay/android-developer/answer/9859348
    children:
      - type: node
        id: sign-build-app-bundle
        title: 签名并检查 Android App Bundle
        description: 保护上传密钥、配置 Play App Signing、递增版本号，并用构建分析工具核对 release 产物、资源和混淆映射。
        tags:
          - AAB
          - 代码签名
      - type: node
        id: run-play-testing-tracks
        title: 通过测试轨道验证发布候选
        description: 从内部测试逐步扩大到封闭或开放测试，收集预发布报告、崩溃与反馈并确认候选版本。
        tags:
          - Play Console
          - Beta
      - type: node
        id: prepare-store-compliance
        title: 准备完整且一致的商店与合规信息
        description: 核对商品详情、内容分级、目标受众、数据安全表单、权限声明和政策要求，使披露与应用行为一致。
        tags:
          - 商店资料
          - Data Safety
        link: https://support.google.com/googleplay/android-developer/answer/10787469
      - type: node
        id: rollout-monitor-production
        title: 分阶段发布并监控线上质量
        description: 逐步扩大生产覆盖，跟踪 Android Vitals、崩溃、ANR、评分和采用率，在指标恶化时暂停或修复发布。
        tags:
          - Android Vitals
          - 灰度发布
        link: https://support.google.com/googleplay/android-developer/answer/6346149
  - type: node
    id: choose-android-specialization
    title: 根据产品方向选择进阶能力
    description: 在完整交付主线稳定后，再选择与目标岗位、设备形态或既有代码库匹配的技术方向深入实践。
    tags:
      - 进阶
      - 选修
    status: optional
    children:
      - type: node
        id: maintain-view-system
        title: 维护传统 View 与 Fragment 项目
        description: 掌握 XML 布局、View 生命周期、Fragment、RecyclerView 和 Compose 互操作，制定可回退的渐进迁移边界。
        tags:
          - View
          - Fragment
          - 既有项目
        status: optional
        link: https://developer.android.com/develop/ui/compose/migrate/interoperability-apis
      - type: node
        id: build-form-factor-experiences
        title: 面向更多 Android 设备形态设计体验
        description: 针对 Wear OS、Android TV、Android Auto 或 XR 的输入、导航、生命周期和分发约束重新设计核心流程。
        tags:
          - Wear OS
          - TV
          - Auto
        status: optional
      - type: node
        id: explore-media-graphics-games
        title: 探索媒体、图形或游戏开发
        description: 根据目标选择 Media3、CameraX、OpenGL、Vulkan 或游戏引擎，并以设备能力和性能预算驱动实现。
        tags:
          - 媒体
          - 图形
          - 游戏
        status: optional
      - type: node
        id: explore-kotlin-multiplatform
        title: 探索 Kotlin Multiplatform 共享逻辑
        description: 在原生 Android 能力稳定后评估共享领域与数据层的收益，并保留平台界面、生命周期和系统集成边界。
        tags:
          - Kotlin Multiplatform
          - 跨平台
        status: optional
