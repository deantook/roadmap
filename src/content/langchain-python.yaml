id: langchain-python
title: LangChain Python 路线图
description: 基于 Python 与 LangChain 构建可测试、可观测的工具调用和检索增强 AI 应用，并完成一个可部署的小型 Agent 项目。
tags: [Python, LangChain, AI, Agent]
nodes:
  - type: node
    id: prerequisites
    title: 补齐 Python 与 LLM 应用基础
    description: 具备虚拟环境、类型标注、HTTP 与异步调用基础，并能辨别模型输出的不确定性与敏感数据风险。
    tags: [前置, Python]
    status: planned
    children:
      - type: roadmap
        roadmapId: python
        title: 掌握 Python 开发基础
        description: 补齐包管理、类型、异常处理与 pytest，避免在框架学习中回补语言细节。
      - type: node
        id: llm-application-boundaries
        title: 识别 LLM 应用边界
        description: 区分提示、上下文、工具与模型配置的职责，了解幻觉、成本、延迟与隐私的基本取舍。
        status: planned

  - type: node
    id: install-and-first-invocation
    title: 安装 LangChain 并完成首次模型调用
    description: 在隔离环境中安装 LangChain 与一个模型提供商集成，使用密钥环境变量运行最小聊天程序。
    tags: [入门, 环境]
    status: planned
    link: https://docs.langchain.com/oss/python/langchain/install
    children:
      - type: node
        id: choose-model-integration
        title: 选择并配置模型集成
        description: 按所用提供商安装对应包，使用明确的模型标识，并将 API 密钥保留在环境变量或密钥管理服务中。
        status: planned
      - type: node
        id: invoke-a-chat-model
        title: 调用聊天模型并检查结果
        description: 使用 invoke 获取响应，记录输入、输出、模型配置与异常，建立可复现的调试样例。
        status: planned

  - type: node
    id: models-and-messages
    title: 使用模型与消息构建对话上下文
    description: 用统一模型接口和消息序列表达系统指令、用户输入与工具执行结果。
    tags: [模型, 消息]
    status: planned
    link: https://docs.langchain.com/oss/python/langchain/models
    children:
      - type: node
        id: compose-message-history
        title: 组织角色化消息历史
        description: 正确组合 system、user、assistant 与 tool 消息，避免把不可信文本误当作系统指令。
        status: planned
      - type: node
        id: control-model-parameters
        title: 控制模型参数与失败处理
        description: 为温度、最大输出和超时设定适合任务的值，并处理速率限制、网络失败与无效响应。
        status: planned
      - type: node
        id: compare-models-by-task
        title: 按任务评估模型选择
        description: 以准确性、工具调用可靠性、延迟和成本比较候选模型，而非只凭单次主观体验决定。
        status: planned

  - type: node
    id: prompts-and-structured-output
    title: 约束提示与结构化输出
    description: 设计可维护的提示模板，并将模型输出校验为应用可消费的数据结构。
    tags: [提示工程, 输出]
    status: planned
    link: https://docs.langchain.com/oss/python/langchain/structured-output
    children:
      - type: node
        id: write-testable-prompts
        title: 编写可测试的提示模板
        description: 将稳定指令、业务上下文和用户输入分离，用少量代表性样例验证提示改动。
        status: planned
      - type: node
        id: define-output-schema
        title: 用 Schema 定义结构化结果
        description: 使用 Pydantic、dataclass 或 JSON Schema 表达字段、枚举和校验规则，拒绝不完整或不可解析结果。
        status: planned
      - type: node
        id: handle-invalid-structured-output
        title: 处理无效结构化输出
        description: 为解析失败设计重试、降级或人工复核路径，不让未经校验的模型文本直接驱动关键操作。
        status: planned

  - type: node
    id: tools-and-tool-safety
    title: 将受控能力封装为工具
    description: 把查询和动作定义为输入明确、输出可解释、权限受限的工具，供模型按需调用。
    tags: [工具, 安全]
    status: planned
    link: https://docs.langchain.com/oss/python/langchain/tools
    children:
      - type: node
        id: define-tools-with-schemas
        title: 定义带类型 Schema 的工具
        description: 用清晰的名称、文档字符串和参数类型约束工具，提供对模型决策有用且最小化的返回结果。
        status: planned
      - type: node
        id: validate-tool-side-effects
        title: 校验参数并隔离副作用
        description: 在工具内部验证输入、设置超时和权限边界；对写入、支付或删除等高风险操作要求显式确认。
        status: planned
      - type: node
        id: test-tool-contracts
        title: 测试工具契约与错误分支
        description: 用单元测试覆盖成功、超时、权限不足和无结果场景，保证错误信息可供 Agent 恢复或上报。
        status: planned

  - type: node
    id: build-agent-workflows
    title: 构建可控的 Agent 工作流
    description: 用 create_agent 组合模型、工具、系统提示和中间件，观察并限制模型—工具循环。
    tags: [Agent, 工作流]
    status: planned
    link: https://docs.langchain.com/oss/python/langchain/agents
    children:
      - type: node
        id: create-first-agent
        title: 创建单工具 Agent
        description: 用 create_agent 完成一个具有明确成功标准的问答或查询任务，并读取最终消息与工具调用轨迹。
        status: planned
      - type: node
        id: apply-agent-middleware
        title: 用中间件施加策略
        description: 通过中间件实现重试、工具策略、模型路由或请求前后处理，使横切规则不散落在业务代码中。
        status: planned
      - type: node
        id: bound-agent-execution
        title: 限制 Agent 执行范围
        description: 设置工具白名单、迭代上限、预算和失败终止条件，避免循环调用与越权执行。
        status: planned

  - type: node
    id: memory-and-state
    title: 管理会话状态与短期记忆
    description: 让多轮对话保留必要上下文，同时控制历史增长、隔离用户会话并避免持久化敏感信息。
    tags: [记忆, 状态]
    status: planned
    link: https://docs.langchain.com/oss/python/langchain/short-term-memory
    children:
      - type: node
        id: scope-conversation-state
        title: 按会话隔离状态
        description: 使用稳定的会话标识保存消息状态，确保不同用户和任务之间不会错误共享上下文。
        status: planned
      - type: node
        id: trim-and-summarize-history
        title: 控制上下文窗口
        description: 依据任务保留、裁剪或摘要历史消息，平衡回答质量、上下文限制、延迟和成本。
        status: planned
      - type: node
        id: protect-memory-data
        title: 保护记忆中的敏感数据
        description: 定义保留期限和删除策略，对密钥、个人信息和高风险内容做最小化存储与访问控制。
        status: planned

  - type: node
    id: retrieval-augmented-generation
    title: 用检索增强回答私有知识
    description: 建立从文档加载、切分、索引到检索和引用呈现的 RAG 闭环，并以检索质量驱动迭代。
    tags: [RAG, 检索]
    status: planned
    link: https://docs.langchain.com/oss/python/langchain/retrieval
    children:
      - type: node
        id: ingest-and-chunk-documents
        title: 加载、清洗并切分文档
        description: 为不同内容类型保留来源元数据，选择能保持语义完整又适合检索的切分策略。
        status: planned
      - type: node
        id: index-and-retrieve-context
        title: 建立索引并检索上下文
        description: 选择嵌入模型与向量存储，使用过滤、查询改写或重排序提高相关片段的召回与排序质量。
        status: planned
      - type: node
        id: ground-answers-in-sources
        title: 让回答可追溯到来源
        description: 将检索片段和出处传入生成步骤，要求模型在证据不足时说明限制，并向用户展示可核验来源。
        status: planned

  - type: node
    id: test-debug-and-evaluate
    title: 测试、调试并评估 Agent
    description: 将 Agent 视为包含非确定性组件的软件系统，用追踪、数据集和验收指标持续发现回归。
    tags: [测试, 评估, 可观测性]
    status: planned
    link: https://docs.langchain.com/langsmith/evaluation
    children:
      - type: node
        id: trace-agent-runs
        title: 追踪完整执行链路
        description: 检查模型输入输出、工具调用、状态变化、延迟和 token 使用，定位失败发生的准确环节。
        status: planned
        link: https://docs.langchain.com/langsmith/trace-with-langchain
      - type: node
        id: build-evaluation-dataset
        title: 建立代表性评估集
        description: 用真实但脱敏的任务、边界案例和失败案例定义期望结果，覆盖回答、检索与工具使用质量。
        status: planned
      - type: node
        id: regression-test-agent-behavior
        title: 将评估接入回归测试
        description: 在提示、模型、工具或索引变更后比较关键指标，并为不可接受的退化设置发布门槛。
        status: planned

  - type: node
    id: capstone-knowledge-agent
    title: 完成可验证的知识库 Agent 项目
    description: 交付一个能检索指定文档、调用只读工具、展示来源并具备测试和追踪的小型 Python 服务或命令行应用。
    tags: [实践, 项目]
    status: planned
    children:
      - type: node
        id: define-capstone-scope
        title: 定义范围、数据与验收标准
        description: 选择一个边界清晰的知识领域，列出允许的工具、权限、失败处理和至少十条可重复评估任务。
        status: planned
      - type: node
        id: implement-capstone-agent
        title: 实现检索、工具调用与引用回答
        description: 组合结构化输出、短期记忆和 RAG；对工具异常和无证据回答提供明确的用户反馈。
        status: planned
      - type: node
        id: ship-capstone-with-quality-gates
        title: 通过质量门槛后交付
        description: 运行单元测试和评估集，检查敏感信息、访问控制、成本上限与可观测性，再写出部署和回滚说明。
        status: planned

  - type: node
    id: advanced-orchestration
    title: 深化编排与扩展协议
    description: 在单 Agent 项目稳定后，再按实际复杂度选择更底层编排、外部工具协议或多 Agent 协作。
    tags: [进阶]
    status: optional
    children:
      - type: node
        id: langgraph-workflows
        title: 使用 LangGraph 处理复杂状态机
        description: 为需持久化、人工介入或确定性分支的长流程建模状态、节点和恢复策略。
        status: optional
        link: https://docs.langchain.com/oss/python/langgraph/overview
      - type: node
        id: model-context-protocol
        title: 通过 MCP 接入外部能力
        description: 理解 MCP 的客户端、服务器和权限边界，在受信任环境中连接外部工具与资源。
        status: optional
        link: https://docs.langchain.com/oss/python/langchain/mcp
      - type: node
        id: multi-agent-coordination
        title: 评估多 Agent 协作是否必要
        description: 仅在角色分工能清晰降低复杂度时引入委派、共享状态和监督，并为协调失败设计降级路径。
        status: optional
