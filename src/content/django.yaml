id: django
title: Django
description: 面向具备 Python 与 Web 基础的学习者，从请求处理、模板、表单和 ORM 出发，构建、测试、保护并部署生产就绪的 Django Web 应用。
tags: [后端, Python, Django, Web, 数据库]
nodes:
  - type: node
    id: prerequisites
    title: 补齐 Python、Web 与数据库基础
    description: 能使用现代 Python 编写模块和测试，理解 HTTP、HTML 表单与关系数据，并用虚拟环境隔离项目依赖。
    tags: [前置]
    status: planned
    children:
      - type: roadmap
        roadmapId: python
        title: 补齐 Python 语言与工程基础
        description: 掌握函数、类、异常、模块、类型提示、虚拟环境和测试，避免在框架阶段回补语言知识。
      - type: roadmap
        roadmapId: sql
        title: 建立 SQL 与关系建模基础
        description: 理解表、键、约束、连接、事务和索引，以便判断 ORM 生成查询的正确性与成本。

  - type: node
    id: first-project
    title: 建立 Django 开发闭环
    description: 安装受支持的 Django 版本，创建 project 与 app，并完成开发服务器、迁移、测试和管理命令的基本循环。
    tags: [入门, 开发工具]
    status: planned
    link: https://docs.djangoproject.com/en/stable/intro/tutorial01/
    children:
      - type: node
        id: environment-install
        title: 创建隔离且可复现的环境
        description: 使用虚拟环境安装官方稳定版本，固定直接依赖并确认 Python 与 Django 版本满足项目约束。
        status: planned
        link: https://docs.djangoproject.com/en/stable/intro/install/
      - type: node
        id: project-app-layout
        title: 区分 project 与 app 边界
        description: 识别 settings、URLconf、WSGI/ASGI 入口和 manage.py 的职责，并按业务能力而非数据表拆分 app。
        status: planned
      - type: node
        id: management-commands
        title: 使用管理命令驱动开发
        description: 熟练运行 runserver、check、makemigrations、migrate、test 和 shell，并能从命令输出定位常见错误。
        status: planned
      - type: node
        id: settings-environments
        title: 分离代码与环境配置
        description: 组织可复用设置，通过环境变量注入密钥、数据库和主机配置，并避免在生产启用 DEBUG。
        status: planned

  - type: node
    id: request-response
    title: 掌握请求到响应的执行路径
    description: 从 URLconf 追踪请求经过 middleware 和 view 生成响应的过程，并用清晰边界组织 HTTP 行为。
    tags: [HTTP, URL, View]
    status: planned
    link: https://docs.djangoproject.com/en/stable/topics/http/
    children:
      - type: node
        id: url-routing
        title: 设计可维护的 URL 路由
        description: 使用 path、include、命名路由与 namespace 组织入口，并通过 reverse 避免在代码和模板中硬编码地址。
        status: planned
      - type: node
        id: function-views
        title: 用函数视图实现明确流程
        description: 读取请求方法和参数，调用应用逻辑并返回正确状态、标头、重定向或渲染响应。
        status: planned
      - type: node
        id: class-based-views
        title: 按需使用类视图和通用视图
        description: 在 CRUD 等重复模式中使用 View 与 Generic View，并在继承和 mixin 开始掩盖控制流时退回显式实现。
        status: planned
        link: https://docs.djangoproject.com/en/stable/topics/class-based-views/
      - type: node
        id: middleware-boundaries
        title: 用 Middleware 实现请求级横切能力
        description: 理解中间件顺序，在其中处理关联 ID、审计或协议策略，并避免放入领域业务规则。
        status: planned
        link: https://docs.djangoproject.com/en/stable/topics/http/middleware/
      - type: node
        id: error-responses
        title: 统一处理错误与异常
        description: 区分 400、403、404 和 500 等失败，提供安全且可诊断的错误页面，并避免泄露内部状态。
        status: planned

  - type: node
    id: templates-forms
    title: 构建安全可用的服务端界面
    description: 使用模板继承、表单校验和静态资源构建可访问的页面，并保持展示、输入和业务逻辑分离。
    tags: [模板, 表单, HTML]
    status: planned
    link: https://docs.djangoproject.com/en/stable/topics/templates/
    children:
      - type: node
        id: template-inheritance
        title: 用模板继承组织页面结构
        description: 通过 base 模板、block、include 或 template partial 复用布局，并保持查询和状态变更离开模板层。
        status: planned
      - type: node
        id: context-autoescape
        title: 安全传递和渲染上下文
        description: 只向模板提供所需数据，理解自动转义与 safe 的边界，并避免拼接不可信 HTML。
        status: planned
      - type: node
        id: forms-validation
        title: 使用 Form 校验用户输入
        description: 绑定 GET 或 POST 数据，呈现字段和非字段错误，并将跨字段业务约束放入可测试的 clean 流程。
        status: planned
        link: https://docs.djangoproject.com/en/stable/topics/forms/
      - type: node
        id: model-forms
        title: 用 ModelForm 实现受控的数据编辑
        description: 显式列出允许编辑的字段，处理提交、重显和保存，并防止意外暴露新增模型字段。
        status: planned
      - type: node
        id: static-media
        title: 区分静态资源与用户上传
        description: 使用 staticfiles 管理版本化前端资源，对上传文件执行类型、大小、存储和访问控制。
        status: planned
        link: https://docs.djangoproject.com/en/stable/howto/static-files/
      - type: node
        id: accessible-ui
        title: 验证页面可访问性
        description: 为表单提供明确 label、错误提示和键盘焦点，在语义 HTML 与基础辅助技术测试中完成验收。
        status: planned

  - type: node
    id: models-orm
    title: 用 ORM 建模并维护数据一致性
    description: 以 PostgreSQL 为生产数据库，设计模型与约束，编写可控 QuerySet，并通过迁移和事务安全演进数据。
    tags: [ORM, PostgreSQL, 事务]
    status: planned
    link: https://docs.djangoproject.com/en/stable/topics/db/
    children:
      - type: node
        id: model-fields-relations
        title: 建模字段、关系与约束
        description: 使用字段类型、ForeignKey、ManyToMany、UniqueConstraint 和 CheckConstraint 表达业务不变量。
        status: planned
      - type: node
        id: queryset-crud
        title: 使用 QuerySet 完成数据访问
        description: 掌握筛选、排序、聚合、表达式和批量操作，并理解 QuerySet 的惰性求值与缓存行为。
        status: planned
        link: https://docs.djangoproject.com/en/stable/topics/db/queries/
      - type: node
        id: query-performance
        title: 检查并优化数据库查询
        description: 使用 explain、select_related、prefetch_related、only 和索引消除 N+1、无界结果集与重复查询。
        status: planned
        link: https://docs.djangoproject.com/en/stable/topics/db/optimization/
      - type: node
        id: custom-managers
        title: 用 Manager 与 QuerySet 封装查询意图
        description: 为可复用筛选和领域术语提供命名方法，同时避免把跨聚合业务流程塞入模型管理器。
        status: planned
      - type: node
        id: transaction-boundaries
        title: 使用 atomic 维护业务不变量
        description: 在用例边界划分短事务，理解 autocommit、锁与 on_commit，并避免在事务中执行无界外部调用。
        status: planned
        link: https://docs.djangoproject.com/en/stable/topics/db/transactions/
      - type: node
        id: schema-data-migrations
        title: 安全演进 Schema 与数据
        description: 审查并提交迁移，使用历史模型编写可逆数据迁移，并为大表变更设计兼容和回滚步骤。
        status: planned
        link: https://docs.djangoproject.com/en/stable/topics/migrations/
      - type: roadmap
        roadmapId: postgresql
        title: 深入 PostgreSQL 运行与优化
        description: 补充索引、执行计划、隔离级别、安全、备份和恢复能力。

  - type: node
    id: authentication-admin
    title: 建立身份、权限与运营后台
    description: 使用 Django Auth 管理用户、Session、组和权限，并将 Admin 限定为可信运营人员的内部工具。
    tags: [认证, 授权, Admin]
    status: planned
    link: https://docs.djangoproject.com/en/stable/topics/auth/
    children:
      - type: node
        id: custom-user-model
        title: 在首次迁移前确定用户模型
        description: 评估默认 User 是否满足需求，若需自定义则在首次 migrate 前配置 AUTH_USER_MODEL，并通过 settings 引用用户类型。
        status: planned
        link: https://docs.djangoproject.com/en/stable/topics/auth/customizing/
      - type: node
        id: login-session-passwords
        title: 实现登录、Session 与密码流程
        description: 使用内置认证视图和安全密码哈希完成登录、退出、改密与重置，并正确配置 Cookie 生命周期。
        status: planned
      - type: node
        id: permissions-groups
        title: 在服务端实施对象操作权限
        description: 使用权限、组和 mixin 或 decorator 限制视图，并在每个敏感操作上重新检查授权。
        status: planned
      - type: node
        id: admin-operations
        title: 配置可控的 Admin 工作流
        description: 注册模型，优化列表和查询，限制字段与操作，并为批量或破坏性操作增加确认与审计。
        status: planned
        link: https://docs.djangoproject.com/en/stable/ref/contrib/admin/

  - type: node
    id: application-security
    title: 保护 Web 信任边界
    description: 运用 Django 的安全机制防御常见 Web 攻击，同时通过配置、基础设施和测试补齐框架无法自动保证的部分。
    tags: [安全, CSRF, XSS]
    status: planned
    link: https://docs.djangoproject.com/en/stable/topics/security/
    children:
      - type: node
        id: csrf-method-safety
        title: 防御 CSRF 并保持方法语义
        description: 为状态变更表单携带 CSRF Token，只用安全方法读取数据，并正确处理 AJAX 与可信来源配置。
        status: planned
      - type: node
        id: xss-injection
        title: 防御 XSS 与注入攻击
        description: 保持模板自动转义，避免危险 HTML 标记和字符串 SQL，并对富文本采用明确的清洗策略。
        status: planned
      - type: node
        id: hosts-https-cookies
        title: 收紧 Host、HTTPS 与 Cookie 配置
        description: 正确设置 ALLOWED_HOSTS、代理 HTTPS 标头、Secure、HttpOnly、SameSite 与 HSTS，并验证重定向行为。
        status: planned
      - type: node
        id: secrets-uploads
        title: 隔离密钥与不可信文件
        description: 保护并轮换 SECRET_KEY 和数据库凭据，将上传文件置于不可执行的独立存储并限制访问。
        status: planned
      - type: node
        id: abuse-protection
        title: 增加速率限制与滥用防护
        description: 在登录、密码重置和高成本端点实施限流、锁定或挑战机制，并记录不含敏感数据的安全事件。
        status: planned

  - type: node
    id: testing-debugging
    title: 建立分层测试与调试策略
    description: 使用 Django 测试工具验证领域逻辑、数据库、表单、视图、权限和模板，并保持测试数据与生产隔离。
    tags: [测试, 调试]
    status: planned
    link: https://docs.djangoproject.com/en/stable/topics/testing/
    children:
      - type: node
        id: unit-tests
        title: 隔离测试纯 Python 逻辑
        description: 对领域规则、验证器和服务函数运行快速单元测试，不为无数据库依赖的代码启动完整 Django 环境。
        status: planned
      - type: node
        id: database-test-cases
        title: 选择正确的数据库测试基类
        description: 区分 TestCase 与 TransactionTestCase 的事务语义，并让每个测试独立构造最小必要数据。
        status: planned
      - type: node
        id: client-view-tests
        title: 用 Test Client 验证 HTTP 行为
        description: 模拟匿名与登录请求，断言状态、重定向、模板、上下文、消息、表单错误和权限结果。
        status: planned
        link: https://docs.djangoproject.com/en/stable/topics/testing/tools/
      - type: node
        id: migration-tests
        title: 验证迁移与数据库约束
        description: 在 PostgreSQL 上从空库应用迁移，测试关键约束和数据迁移，并检查升级路径不会依赖当前模型状态。
        status: planned
      - type: node
        id: browser-tests
        title: 覆盖关键浏览器旅程
        description: 对登录、表单提交和权限等高价值流程运行少量端到端测试，补足 Test Client 无法验证的浏览器行为。
        status: planned
      - type: node
        id: debug-failures
        title: 从日志、查询和错误页定位故障
        description: 在本地使用安全的 DEBUG 信息、结构化日志和 SQL 检查定位路由、模板、表单、ORM 与配置问题。
        status: planned

  - type: node
    id: capstone-application
    title: 交付一个完整的业务应用
    description: 构建含服务端页面、PostgreSQL、角色权限、运营后台、用户上传和自动化测试的可运行应用，并提供部署与恢复说明。
    tags: [综合实践]
    status: planned
    children:
      - type: node
        id: design-domain-journeys
        title: 设计领域边界与用户旅程
        description: 从角色和业务不变量推导 app、模型、页面、表单、权限和验收场景，并记录关键取舍。
        status: planned
      - type: node
        id: implement-vertical-slices
        title: 按纵向切片交付核心流程
        description: 逐个完成从 URL、view、form 到 template 和数据库的可测试旅程，避免先堆出孤立层次。
        status: planned
      - type: node
        id: verify-failure-paths
        title: 验证失败与恢复路径
        description: 覆盖非法输入、并发更新、无权限、上传失败、数据库不可用和迁移失败，并确认反馈可诊断。
        status: planned

  - type: node
    id: production-readiness
    title: 让应用可部署、可观测、可恢复
    description: 使用生产应用服务器运行 Django，管理静态与媒体文件，并验证安全设置、日志、资源限制、迁移和备份恢复。
    tags: [部署, 可观测性, 运维]
    status: planned
    link: https://docs.djangoproject.com/en/stable/howto/deployment/
    children:
      - type: node
        id: deployment-checklist
        title: 通过 Django 部署检查
        description: 在生产设置上运行 check --deploy，关闭 DEBUG，并核对 SECRET_KEY、ALLOWED_HOSTS、HTTPS、Cookie 和错误报告。
        status: planned
        link: https://docs.djangoproject.com/en/stable/howto/deployment/checklist/
      - type: node
        id: wsgi-asgi-server
        title: 选择并配置生产应用服务器
        description: 同步应用优先选择成熟 WSGI 部署，只有存在真实异步需求时采用 ASGI，并设置进程、超时和优雅终止。
        status: planned
      - type: node
        id: static-media-delivery
        title: 独立交付静态与媒体文件
        description: 运行 collectstatic，将静态资源交给专用服务器或对象存储，并为不可信媒体配置隔离、权限和备份。
        status: planned
      - type: node
        id: migrations-release
        title: 编排兼容的迁移与发布
        description: 在发布前备份并验证迁移，采用扩展再收缩的兼容步骤，避免新旧实例并存时破坏读写。
        status: planned
      - type: node
        id: logging-health-metrics
        title: 建立日志、健康检查与指标
        description: 关联请求和错误日志，暴露最小健康信号，采集延迟、错误率、队列、数据库和进程资源指标。
        status: planned
        link: https://docs.djangoproject.com/en/stable/howto/logging/
      - type: node
        id: backup-recovery
        title: 演练数据库与媒体恢复
        description: 定义可接受的数据丢失和恢复时间，实际恢复 PostgreSQL 与用户文件，并验证应用可重新提供服务。
        status: planned
      - type: roadmap
        roadmapId: docker
        title: 深入容器镜像与运行实践
        description: 补充镜像分层、非 root 运行、网络、资源限制和可重复构建能力。

  - type: node
    id: advanced-paths
    title: 按产品需求选择深化方向
    description: 在核心同步 Web 应用稳定后，再根据接口消费者、并发模型和运维约束选择 API、异步、任务或缓存能力。
    tags: [进阶]
    status: optional
    children:
      - type: node
        id: json-api
        title: 构建 JSON API
        description: 对少量接口可使用 JsonResponse 明确处理方法、输入与错误；需要完整 API 能力时再评估 Django REST Framework。
        status: optional
        link: https://www.django-rest-framework.org/tutorial/quickstart/
      - type: node
        id: async-asgi
        title: 在 ASGI 下使用异步能力
        description: 仅为长连接或高并发外部 I/O 引入 async view，保持 middleware 与调用链兼容并测量同步切换成本。
        status: optional
        link: https://docs.djangoproject.com/en/stable/topics/async/
      - type: node
        id: background-tasks
        title: 将慢任务移出请求周期
        description: 使用 Tasks 定义和入队可序列化工作，为生产选择真实 Worker 后端，并设计幂等、重试和失败可见性。
        status: optional
        link: https://docs.djangoproject.com/en/stable/topics/tasks/
      - type: node
        id: caching
        title: 基于测量引入缓存
        description: 先优化查询与代码，再为可失效的数据选择页面、片段或低层缓存，并测试一致性和缓存击穿。
        status: optional
        link: https://docs.djangoproject.com/en/stable/topics/cache/
      - type: node
        id: reusable-apps
        title: 提炼可复用 Django App
        description: 在边界稳定后抽取独立 app，声明最小依赖、隔离迁移和静态资源，并在多个项目中验证安装与升级。
        status: optional
        link: https://docs.djangoproject.com/en/stable/intro/reusable-apps/
      - type: roadmap
        roadmapId: kubernetes
        title: 进入 Kubernetes 交付路线
        description: 当应用确需集群编排时，继续学习工作负载、配置、探针、资源限制和发布策略。
