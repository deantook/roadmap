      - type: node
        id: lead-organizational-change
        title: 领导可解释的组织变革
        description: 对重组、团队合并、角色转换和责任变化开展影响评估，尽早沟通不变项与未知项并提供参与和反馈渠道。
        status: planned
      - type: node
