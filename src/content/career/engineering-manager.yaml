    status: planned
    children:
      - type: node
        id: diagnose-capstone-system
        title: 诊断团队与工程系统
        description: 访谈关键角色并检查交付流、质量、事故、架构、负担和团队健康数据，形成事实、假设与待验证问题清单。
        status: planned
      - type: node
