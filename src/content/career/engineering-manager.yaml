  - type: node
    id: manage-knowledge-and-change
    title: 沉淀知识并领导组织变革
    description: 让架构、流程、决定与经验可被复用，并用影响评估、参与式计划和迁移验证安全完成技术与团队变化。
    tags: [知识管理, 变更管理, 遗留系统]
    status: planned
    link: https://www.hse.gov.uk/stress/standards/change.htm
    children:
      - type: node
        id: build-living-knowledge-system
        title: 建立可维护的工程知识系统
        description: 为架构、流程、决策、Runbook、最佳实践和经验教训定义所有者、位置、评审周期与归档规则。
        status: planned
      - type: node
        id: design-knowledge-sharing
        title: 用多种机制完成知识转移
        description: 组合导师计划、结对、知识库、Brown Bag、Tech Talk 和轮岗，验证关键工作不依赖单一人员。
        status: planned
      - type: node
        id: plan-technical-change
        title: 规划技术采用、工具迁移与流程变化
        description: 说明变化原因、目标能力、影响人群、兼容窗口、培训、迁移步骤、回退条件和采用度量。
        status: planned
      - type: node
        id: retire-legacy-systems
        title: 安全退役遗留系统
        description: 盘点依赖、数据、流量、合规和隐性使用者，分阶段迁移并验证替代能力后再撤销访问与运行资源。
