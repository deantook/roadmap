id: computer-networking
title: 计算机网络
description: 面向具备基本计算机操作经验的学习者，从分层、寻址与协议入手，成长为能分析应用通信、使用抓包与系统工具定位故障，并设计和验证小型网络的实践者。
tags: [计算机网络, TCP/IP, 网络协议, 排错]
nodes:
  - type: node
    id: build-network-mental-model
    title: 建立端到端通信模型
    description: 用分层、封装和逐跳转发解释数据如何从一个应用进程到达另一台主机上的进程。
    tags: [TCP/IP, 分层, 封装]
    status: planned
    link: https://www.rfc-editor.org/rfc/rfc1122
    children:
      - type: node
        id: identify-network-components
        title: 识别网络中的端点与中间设备
        description: 区分主机、网卡、交换机、路由器、接入点、防火墙和代理在通信路径中的职责。
        tags: [网络设备, 拓扑]
        status: planned
      - type: node
        id: compare-layering-models
        title: 使用 TCP/IP 与 OSI 模型定位协议职责
        description: 将常见协议映射到链路、网络、传输和应用层，并把 OSI 模型作为分析语言而非实现清单。
        tags: [OSI, TCP/IP]
        status: planned
      - type: node
        id: trace-encapsulation
        title: 追踪数据的封装与解封装
        description: 从应用数据依次识别段、数据报、帧和物理信号，并说明各层头部服务于哪一段通信范围。
        tags: [数据包, 帧, 封装]
        status: planned
      - type: node
        id: create-safe-network-lab
        title: 创建可重复的隔离实验环境
        description: 使用虚拟机、容器或网络命名空间搭建至少两个端点，记录拓扑、地址和恢复初始状态的方法。
        tags: [实验, 虚拟网络]
        status: planned

  - type: node
    id: deliver-on-local-networks
    title: 理解局域网内的数据交付
    description: 根据二层地址、邻居发现和交换行为判断同一局域网中的帧如何到达正确端点。
    tags: [Ethernet, MAC, 局域网]
    status: planned
    children:
      - type: node
        id: read-ethernet-frames
        title: 阅读 Ethernet 帧与 MAC 地址
        description: 识别源地址、目的地址和 EtherType，并区分单播、广播与多播交付。
        tags: [Ethernet, MAC]
        status: planned
      - type: node
        id: explain-switch-forwarding
        title: 解释交换机的学习与转发
        description: 根据 MAC 地址表预测帧的转发、泛洪和过滤行为，并识别二层环路风险。
        tags: [交换机, 二层转发]
        status: planned
      - type: node
        id: resolve-link-layer-neighbors
        title: 使用 ARP 与 NDP 解析下一跳
        description: 说明 IPv4 ARP 和 IPv6 邻居发现如何把下一跳 IP 地址映射到链路层地址，并检查邻居缓存。
        tags: [ARP, NDP, 邻居发现]
        status: planned
        link: https://www.rfc-editor.org/rfc/rfc826
      - type: node
        id: segment-with-vlans
        title: 使用 VLAN 划分二层广播域
        description: 区分 access 与 trunk 链路，解释 VLAN 标签和跨 VLAN 路由，并在实验拓扑中验证隔离效果。
        tags: [VLAN, 网络分段]
        status: optional
      - type: node
        id: explore-wireless-access
        title: 探索 Wi-Fi 接入与共享介质
        description: 区分 SSID、信道、关联和加密的作用，并观察干扰、距离与竞争如何影响无线连接。
        tags: [Wi-Fi, 无线网络]
        status: optional

  - type: node
    id: address-and-route-ip
    title: 使用 IP 寻址并跨网络路由
    description: 计算地址范围、选择下一跳并阅读路由表，解释数据报如何穿过多个网络到达目的地址。
    tags: [IPv4, IPv6, 路由]
    status: planned
    link: https://www.rfc-editor.org/rfc/rfc8200
    children:
      - type: node
        id: calculate-ip-subnets
        title: 使用 CIDR 划分 IPv4 子网
        description: 在二进制与点分十进制之间转换，依据前缀长度计算网络、主机和广播地址，并规划不重叠网段。
        tags: [IPv4, CIDR, 子网]
        status: planned
        link: https://www.rfc-editor.org/rfc/rfc4632
      - type: node
        id: use-ipv6-addressing
        title: 阅读并规划 IPv6 地址
        description: 压缩和展开 IPv6 地址，区分单播、链路本地与多播范围，并使用前缀而非套用 IPv4 广播思维。
        tags: [IPv6, 地址规划]
        status: planned
      - type: node
        id: choose-next-hop
        title: 根据路由表选择下一跳
        description: 应用最长前缀匹配，区分直连路由、默认路由和静态路由，并用实际路由表预测出接口。
        tags: [路由表, 最长前缀匹配]
        status: planned
      - type: node
        id: configure-host-addressing
        title: 配置主机地址与默认网关
        description: 使用静态配置或 DHCP 获得地址、前缀、网关和 DNS 参数，并验证租约与续租行为。
        tags: [DHCP, 网关, 网络配置]
        status: planned
        link: https://www.rfc-editor.org/rfc/rfc2131
      - type: node
        id: explain-icmp-and-mtu
        title: 使用 ICMP 分析可达性与 MTU
        description: 解读回显、不可达和超时消息，说明 TTL 或 Hop Limit、路径 MTU 与分片对交付的影响。
        tags: [ICMP, TTL, MTU]
        status: planned
      - type: node
        id: evaluate-nat-boundaries
        title: 评估 NAT 对端到端通信的影响
        description: 追踪地址与端口转换状态，区分私有与公共地址，并说明 NAT 对入站连接和协议设计的约束。
        tags: [NAT, 私有地址]
        status: planned
        link: https://www.rfc-editor.org/rfc/rfc3022

  - type: node
    id: reason-about-transport
    title: 根据通信需求选择传输方式
    description: 用可靠性、顺序、延迟和消息边界解释 TCP 与 UDP 的取舍，并定位端口和连接状态问题。
    tags: [TCP, UDP, 端口]
    status: planned
    children:
      - type: node
        id: map-processes-with-sockets
        title: 使用套接字与端口定位进程
        description: 区分监听与已连接套接字，使用地址、端口和传输协议唯一描述通信端点。
        tags: [Socket, 端口, 进程]
        status: planned
      - type: node
        id: analyze-udp-datagrams
        title: 分析 UDP 数据报通信
        description: 验证 UDP 保留消息边界但不保证交付、顺序或去重，并在应用层明确超时和重试策略。
        tags: [UDP, 数据报]
        status: planned
        link: https://www.rfc-editor.org/rfc/rfc768
      - type: node
        id: trace-tcp-lifecycle
        title: 追踪 TCP 连接生命周期
        description: 在抓包中识别握手、序号、确认、重传和连接关闭，并用状态转换解释常见连接现象。
        tags: [TCP, 握手, 重传]
        status: planned
        link: https://www.rfc-editor.org/rfc/rfc9293
      - type: node
        id: explain-flow-and-congestion-control
        title: 区分流量控制与拥塞控制
        description: 说明接收窗口如何保护端点、拥塞窗口如何适应路径，并观察丢包与往返时间对吞吐量的影响。
        tags: [流量控制, 拥塞控制]
        status: planned
      - type: node
        id: build-socket-program
        title: 编写最小 TCP 与 UDP 程序
        description: 使用熟悉的语言实现客户端和服务端，处理分帧、部分读写、超时、断开与资源释放。
        tags: [Socket 编程, 实践]
        status: optional
        link: https://docs.python.org/3/howto/sockets.html

  - type: node
    id: inspect-application-protocols
    title: 追踪常见应用协议
    description: 从名称解析到安全请求完整解释一次网络应用访问，并在协议消息中验证每一步。
    tags: [DNS, HTTP, TLS]
    status: planned
    children:
      - type: node
        id: trace-dns-resolution
        title: 追踪 DNS 名称解析
        description: 区分 stub、递归与权威解析器，查询常用记录和 TTL，并沿委派链定位缓存或配置问题。
        tags: [DNS, 缓存, 域名]
        status: planned
        link: https://www.rfc-editor.org/rfc/rfc1034
      - type: node
        id: read-http-exchanges
        title: 阅读 HTTP 请求与响应
        description: 使用方法、目标、状态码、字段和消息内容解释应用行为，并识别持久连接、缓存和代理的作用。
        tags: [HTTP, Web]
        status: planned
        link: https://www.rfc-editor.org/rfc/rfc9110
      - type: node
        id: verify-tls-connections
        title: 验证 TLS 身份与安全连接
        description: 说明握手、证书链、主机名验证和密钥协商的作用，并诊断过期证书、名称不匹配与信任链故障。
        tags: [TLS, PKI, 证书]
        status: planned
        link: https://www.rfc-editor.org/rfc/rfc8446
      - type: node
        id: compare-remote-access-protocols
        title: 安全使用 SSH 远程访问
        description: 验证服务器身份，使用密钥认证建立远程会话与端口转发，并限制凭据和转发暴露范围。
        tags: [SSH, 端口转发]
        status: planned
      - type: node
        id: explore-modern-transports
        title: 比较 HTTP/2、HTTP/3 与 QUIC
        description: 观察多路复用、头部压缩和基于 UDP 的 QUIC 如何改变连接建立与队头阻塞行为。
        tags: [HTTP/2, HTTP/3, QUIC]
        status: optional
        link: https://www.rfc-editor.org/rfc/rfc9000

  - type: node
    id: troubleshoot-with-evidence
    title: 使用工具按层排查网络故障
    description: 从症状提出可证伪假设，沿配置、名称解析、路径、传输和应用逐层收集证据并缩小故障范围。
    tags: [排错, 抓包, 命令行]
    status: planned
    children:
      - type: node
        id: inspect-host-network-state
        title: 检查主机网络状态
        description: 查看接口、地址、邻居、路由和套接字，确认本机配置与监听进程是否符合预期。
        tags: [ip, ss, 系统工具]
        status: planned
        link: https://man7.org/linux/man-pages/man8/ip.8.html
      - type: node
        id: test-resolution-path-and-service
        title: 分别验证名称、路径、端口与协议
        description: 使用 dig、ping、traceroute、nc 和 curl 将“网络不通”拆成可独立验证的环节，并正确解读工具局限。
        tags: [dig, ping, traceroute, curl]
        status: planned
      - type: node
        id: capture-and-filter-packets
        title: 安全捕获并过滤数据包
        description: 选择正确接口和捕获位置，区分捕获过滤器与显示过滤器，并最小化敏感数据的采集与保存。
        tags: [Wireshark, tcpdump, 过滤器]
        status: planned
        link: https://www.wireshark.org/docs/wsug_html_chunked/
      - type: node
        id: correlate-packets-with-symptoms
        title: 用协议状态关联抓包与症状
        description: 在时间线上关联 DNS、TCP、TLS 和 HTTP 事件，识别超时、重传、重置、拒绝和应用错误的差异。
        tags: [协议分析, 时间线]
        status: planned
      - type: node
        id: write-network-incident-note
        title: 编写可复现的网络故障记录
        description: 记录拓扑、时间、命令、关键数据包、已排除假设、根因和修复验证，使他人能够复查结论。
        tags: [故障记录, 复现]
        status: planned

  - type: node
    id: protect-network-boundaries
    title: 设计最小暴露的网络边界
    description: 根据资产、信任边界和流量方向实施分段、过滤与加密，并验证控制没有破坏必要通信。
    tags: [网络安全, 防火墙, 加密]
    status: planned
    children:
      - type: node
        id: model-network-threats
        title: 识别网络资产与信任边界
        description: 标出需要保护的服务、管理面和敏感数据，分析窃听、伪装、中间人、扫描与拒绝服务风险。
        tags: [威胁建模, 信任边界]
        status: planned
      - type: node
        id: filter-least-privilege-flows
        title: 使用防火墙限制必要流量
        description: 以来源、目的、协议、端口和连接状态表达最小权限规则，并通过日志和连通性测试验证结果。
        tags: [防火墙, ACL, 最小权限]
        status: planned
      - type: node
        id: segment-untrusted-systems
        title: 对不同信任级别实施网络分段
        description: 将用户、服务器、管理和不可信设备划分边界，明确允许的跨区流量并避免隐式全互通。
        tags: [网络分段, 隔离]
        status: planned
      - type: node
        id: secure-data-in-transit
        title: 保护传输中的身份与数据
        description: 优先使用经过验证的安全协议和证书校验，淘汰明文凭据，并为密钥和证书建立更新机制。
        tags: [TLS, 证书, 加密]
        status: planned
      - type: node
        id: evaluate-vpn-access
        title: 评估 VPN 与零信任访问
        description: 根据身份、设备状态、资源范围和审计需求比较网络级隧道与应用级访问，而非把接入等同于完全信任。
        tags: [VPN, 零信任]
        status: optional

  - type: node
    id: measure-network-quality
    title: 测量并改善网络质量
    description: 使用延迟、吞吐量、丢包、抖动和可用性描述网络表现，通过受控实验验证优化效果。
    tags: [性能, 可靠性, 可观测性]
    status: planned
    children:
      - type: node
        id: distinguish-performance-metrics
        title: 区分带宽、吞吐量与延迟
        description: 结合序列化、传播、处理和排队延迟解释测量结果，避免用链路标称带宽代替应用吞吐量。
        tags: [带宽, 吞吐量, 延迟]
        status: planned
      - type: node
        id: measure-loss-jitter-throughput
        title: 测量丢包、抖动与吞吐量
        description: 在受控端点之间重复测试并记录方向、并发、包大小和时间窗口，区分路径问题与端点瓶颈。
        tags: [丢包, 抖动, 基准测试]
        status: planned
      - type: node
        id: explain-queues-and-bufferbloat
        title: 识别排队与 Bufferbloat
        description: 在负载变化时同时观察吞吐量和往返时间，判断过深队列、拥塞与服务质量策略的影响。
        tags: [排队, Bufferbloat, QoS]
        status: planned
      - type: node
        id: monitor-network-service-health
        title: 监测网络与服务健康状态
        description: 组合主动探测、设备或主机指标、流量摘要和日志，围绕用户可感知目标设置可行动告警。
        tags: [监控, 指标, 告警]
        status: planned
      - type: node
        id: explore-traffic-distribution
        title: 探索负载均衡与内容分发
        description: 比较四层与七层负载均衡、健康检查和 CDN 缓存对路径、故障转移与一致性的影响。
        tags: [负载均衡, CDN]
        status: optional

  - type: node
    id: complete-network-capstone
    title: 完成可验证的小型网络项目
    description: 设计并实现一个包含多个网段、名称解析和应用服务的实验网络，通过抓包、故障注入和文档证明其正确性。
    tags: [综合实践, 网络设计, 验收]
    status: planned
    children:
      - type: node
        id: design-capstone-topology
        title: 设计地址规划与通信策略
        description: 绘制端点、交换与路由边界，为至少两个网段分配不重叠地址，并列出必要与禁止的流量。
        tags: [拓扑, 地址规划]
        status: planned
      - type: node
        id: implement-capstone-services
        title: 部署名称解析与应用服务
        description: 配置客户端、网关、DNS 和一个 TCP 或 HTTP 服务，使允许的端到端访问能够稳定复现。
        tags: [DNS, 服务部署]
        status: planned
      - type: node
        id: enforce-capstone-policy
        title: 实施并验证分段规则
        description: 配置路由与防火墙规则，用正向和反向测试证明必要流量可达且非授权路径被阻止。
        tags: [防火墙, 验证]
        status: planned
      - type: node
        id: diagnose-injected-failures
        title: 注入并诊断跨层故障
        description: 分别制造错误前缀、DNS 失败、端口阻断和证书问题，保存命令与抓包证据并给出根因。
        tags: [故障注入, 抓包, 排错]
        status: planned
      - type: node
        id: document-capstone-results
        title: 交付可复现的网络运行手册
        description: 汇总拓扑、配置、验证矩阵、基线指标、故障记录和重建步骤，使他人能独立复现实验。
        tags: [运行手册, 文档]
        status: planned

  - type: node
    id: choose-networking-direction
    title: 选择进阶应用方向
    description: 在具备协议分析与排错基础后，按岗位目标进入服务开发、自动化运维或平台网络实践。
    tags: [进阶, 职业方向]
    status: optional
    children:
      - type: roadmap
        roadmapId: backend
        title: 将网络能力用于后端服务
        description: 深入 HTTP API、服务安全、可观测性、性能与分布式系统通信。
      - type: roadmap
        roadmapId: devops
        title: 将网络能力用于 DevOps 与可靠性工程
        description: 在自动化交付、基础设施、监控和事件响应中应用网络排错能力。
      - type: roadmap
        roadmapId: docker
        title: 学习容器网络基础
        description: 理解容器的网络隔离、端口发布、服务发现和多容器通信。
      - type: roadmap
        roadmapId: kubernetes
        title: 深入 Kubernetes 集群网络
        description: 学习 Pod 通信、Service、Ingress、DNS 与网络策略等平台网络机制。
