        status: optional
        link: https://opendatastructures.org/
      - type: node
        id: explore-integer-and-cache-oblivious-structures
        title: 探索整数与 Cache-oblivious 结构
        description: 在键域受限或多级缓存显著影响时评估 Trie、van Emde Boas 和 Cache-oblivious 布局的适用性。
        tags: [整数结构, Cache-oblivious]
        status: optional
      - type: node
        id: explore-external-memory-and-streaming
        title: 面向外部存储与流式数据设计
        description: 根据块 I/O、写放大、顺序扫描和内存上限选择 B-tree、LSM-tree、Bloom filter 或流式摘要。
        tags: [外部存储, LSM-tree, Bloom Filter]
        status: optional
      - type: node
