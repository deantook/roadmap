  - type: node
    id: choose-advanced-data-structure-direction
    title: 选择数据结构深化方向
    description: 完成基础结构和综合项目后，再按应用规模、硬件约束或研究兴趣进入高级结构与算法方向。
    tags: [进阶, 专题]
    status: optional
    children:
      - type: node
        id: explore-advanced-search-structures
