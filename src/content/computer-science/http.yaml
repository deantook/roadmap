id: http
title: HTTP 路线图
description: 面向具备基本网络与编程经验的学习者，从请求响应、报文和语义入手，成长为能正确实现缓存、安全、性能、测试与排错的 HTTP 客户端或服务端开发者。
tags: [HTTP, Web, 网络协议, 后端]
nodes:
  - type: roadmap
    roadmapId: computer-networking
    title: 按需补齐计算机网络基础
    description: 若尚不能解释 DNS、TCP、UDP、TLS 与端口，请先学习端到端通信和常用网络排错方法。

  - type: node
    id: build-http-mental-model
    title: 建立 HTTP 端到端心智模型
    description: 从 URI、资源、表示和请求响应链解释用户代理如何经由中间节点与源服务器交互。
    tags: [资源, 表示, 请求响应]
    status: planned
    link: https://www.rfc-editor.org/rfc/rfc9110
    children:
      - type: node
        id: distinguish-web-layers
        title: 区分 HTTP 与相邻协议的职责
        description: 说明 DNS 负责名称解析、传输层负责字节交付、TLS 负责通道安全，而 HTTP 定义应用消息与语义。
        tags: [DNS, TCP, TLS]
        status: planned
      - type: node
        id: identify-http-roles
        title: 识别 HTTP 通信角色
        description: 区分用户代理、客户端、源服务器、代理、网关、隧道与缓存，并画出一次请求经过的实际路径。
        tags: [客户端, 服务器, 代理]
        status: planned
      - type: node
        id: reason-about-resources
        title: 用资源与表示描述交互
        description: 将资源视为由 URI 标识的目标，将响应内容视为资源在特定时间和协商条件下的一种表示。
        tags: [Resource, Representation, URI]
        status: planned
      - type: node
        id: parse-http-uris
        title: 正确拆解 HTTP URI
        description: 识别 scheme、authority、host、port、path、query 与 fragment，理解 fragment 不会作为 HTTP 请求目标发送。
        tags: [URI, URL, Authority]
        status: planned
        link: https://www.rfc-editor.org/rfc/rfc3986
      - type: node
        id: explain-statelessness
        title: 解释无状态协议与应用状态
        description: 说明单次请求为何不隐含前序上下文，以及 Cookie、令牌、缓存和服务端会话如何在协议之上建立状态。
        tags: [无状态, 会话]
        status: planned

  - type: node
    id: read-http1-messages
    title: 阅读并构造 HTTP/1.1 消息
    description: 从原始字节中识别起始行、字段、空行、内容与消息边界，并正确处理连接和中间节点转发。
    tags: [HTTP/1.1, 报文, Framing]
    status: planned
    link: https://www.rfc-editor.org/rfc/rfc9112
    children:
      - type: node
        id: parse-request-line
        title: 解析请求行与请求目标
        description: 从 method、request-target 和 HTTP-version 构造请求行，并区分常见的 origin-form 与代理使用的其他形式。
        tags: [Request Line, Method, Target]
        status: planned
      - type: node
        id: parse-status-line
        title: 解析状态行
        description: 读取协议版本和三位状态码，把 reason phrase 仅作为可选说明而非程序判断依据。
        tags: [Status Line, Status Code]
        status: planned
      - type: node
        id: handle-http-fields
        title: 安全处理 HTTP 字段
        description: 将字段名视为大小写不敏感，按字段定义处理重复值、列表与空白，不用通用字符串拼接代替协议解析。
        tags: [Header Fields, Parsing]
        status: planned
      - type: node
        id: determine-message-boundaries
        title: 确定消息内容边界
        description: 根据方法、状态码、Content-Length、Transfer-Encoding 和连接关闭判断内容长度，并拒绝矛盾或含糊的 framing。
        tags: [Content-Length, Chunked, Framing]
        status: planned
      - type: node
        id: manage-http1-connections
        title: 管理持久连接与失败重试
        description: 复用连接并设置连接、读取和空闲超时，仅在语义允许且能判断请求未生效时安全重试。
        tags: [Keep-Alive, Timeout, Retry]
        status: planned
      - type: node
        id: inspect-raw-exchange
        title: 完成一次原始 HTTP/1.1 交换
        description: 使用 nc、openssl s_client 或最小套接字程序发送请求，逐字节标注消息结构并与 curl 结果对照。
        tags: [实验, curl, Socket]
        status: planned

  - type: node
    id: apply-http-semantics
    title: 正确应用方法与状态语义
    description: 根据操作意图选择方法和状态码，使客户端、缓存、代理与重试机制能够一致理解结果。
    tags: [Method, Status Code, 语义]
    status: planned
    link: https://www.rfc-editor.org/rfc/rfc9110
    children:
      - type: node
        id: classify-method-properties
        title: 区分安全、幂等与可缓存方法
        description: 分别判断方法是否只读、重复执行效果是否相同以及响应是否可缓存，不把三个属性混为一谈。
        tags: [Safe, Idempotent, Cacheable]
        status: planned
      - type: node
        id: use-retrieval-methods
        title: 使用 GET、HEAD 与 OPTIONS
        description: 用 GET 获取表示、用 HEAD 获取与 GET 对应的元数据，并用 OPTIONS 发现目标支持的通信选项。
        tags: [GET, HEAD, OPTIONS]
        status: planned
      - type: node
        id: use-state-changing-methods
        title: 使用 POST、PUT、PATCH 与 DELETE
        description: 按创建、完整替换、部分修改和删除的真实语义选择方法，并明确重复请求与并发更新的行为。
        tags: [POST, PUT, PATCH, DELETE]
        status: planned
      - type: node
        id: select-success-status
        title: 选择准确的成功状态码
        description: 在 200、201、202、204、206 等状态间按是否创建资源、异步受理、是否返回内容和是否部分传输进行选择。
        tags: [2xx, Success]
        status: planned
      - type: node
        id: handle-redirects
        title: 正确处理重定向
        description: 区分临时与永久、是否允许改变方法的 301、302、303、307、308，并设置循环和跨源凭据边界。
        tags: [3xx, Redirect]
        status: planned
      - type: node
        id: distinguish-client-server-errors
        title: 区分客户端错误与服务端错误
        description: 用 4xx 表达请求在当前条件下不能满足，用 5xx 表达服务器失败，并为认证、授权、冲突、限流和不可用选择具体状态。
        tags: [4xx, 5xx, Error]
        status: planned
      - type: node
        id: design-retry-policy
        title: 按语义设计重试策略
        description: 综合方法幂等性、响应状态、Retry-After、退避、抖动和幂等键，避免重试放大故障或重复产生副作用。
        tags: [Retry-After, Backoff, Idempotency Key]
        status: planned

  - type: node
    id: exchange-representations
    title: 交换并协商资源表示
    description: 用表示元数据、媒体类型、内容编码和协商字段让不同客户端正确解释同一资源的内容。
    tags: [Content-Type, Content Negotiation, Compression]
    status: planned
    link: https://www.rfc-editor.org/rfc/rfc9110#section-8
    children:
      - type: node
        id: set-representation-metadata
        title: 设置准确的表示元数据
        description: 为内容声明 Content-Type、字符集和 Content-Language，避免依赖接收方猜测格式。
        tags: [Media Type, Charset, Language]
        status: planned
      - type: node
        id: distinguish-representation-content
        title: 区分表示数据与消息内容
        description: 追踪表示经过内容编码或范围选择后如何成为消息内容，并避免混淆资源、表示和传输字节。
        tags: [Representation Data, Content]
        status: planned
      - type: node
        id: negotiate-content
        title: 实现主动内容协商
        description: 根据 Accept、Accept-Encoding 和 Accept-Language 选择可提供的表示，无法满足时返回明确结果。
        tags: [Accept, Accept-Encoding, Accept-Language]
        status: planned
      - type: node
        id: vary-cache-keys
        title: 用 Vary 对齐协商与缓存
        description: 让共享缓存把实际影响表示选择的请求字段纳入缓存键，避免语言、编码或跨域响应串用。
        tags: [Vary, Cache Key]
        status: planned
      - type: node
        id: apply-content-codings
        title: 协商并验证内容压缩
        description: 为适合的文本内容选择 gzip 或 br，保留未压缩回退并确认 Content-Length、ETag 和缓存变体保持一致。
        tags: [gzip, Brotli, Content-Encoding]
        status: planned
      - type: node
        id: stream-large-content
        title: 流式处理大型或渐进内容
        description: 在客户端和服务端使用有界缓冲、背压、取消与超时，避免把完整请求或响应一次性载入内存。
        tags: [Streaming, Backpressure, Cancellation]
        status: planned

  - type: node
    id: control-caching-and-concurrency
    title: 使用缓存与条件请求控制数据新鲜度
    description: 设计缓存键、新鲜度、验证器和前置条件，在减少传输的同时避免返回错误版本或覆盖并发更新。
    tags: [HTTP Cache, Conditional Request, Range]
    status: planned
    link: https://www.rfc-editor.org/rfc/rfc9111
    children:
      - type: node
        id: distinguish-cache-types
        title: 区分私有缓存与共享缓存
        description: 识别浏览器、代理、CDN 和应用缓存的信任边界，判断响应能否存储及可供哪些请求复用。
        tags: [Private Cache, Shared Cache, CDN]
        status: planned
      - type: node
        id: define-cache-policy
        title: 使用 Cache-Control 定义缓存策略
        description: 根据内容敏感度和更新方式组合 max-age、s-maxage、public、private、no-cache、no-store 与 must-revalidate。
        tags: [Cache-Control, Freshness]
        status: planned
      - type: node
        id: calculate-freshness
        title: 判断响应新鲜度与年龄
        description: 结合 Date、Age、缓存指令和启发式规则判断响应能否直接复用，并分清陈旧响应与禁止存储。
        tags: [Date, Age, Stale]
        status: planned
      - type: node
        id: validate-cached-responses
        title: 使用验证器重新验证缓存
        description: 生成强弱 ETag 或 Last-Modified，并用 If-None-Match、If-Modified-Since 与 304 避免重复传输内容。
        tags: [ETag, Last-Modified, '304']
        status: planned
      - type: node
        id: prevent-lost-updates
        title: 用前置条件防止更新丢失
        description: 对状态变更请求使用 If-Match 或 If-Unmodified-Since，在资源版本不匹配时返回 412 而不是静默覆盖。
        tags: [If-Match, '412', 乐观并发]
        status: planned
      - type: node
        id: serve-byte-ranges
        title: 支持范围请求与断点续传
        description: 正确处理 Range、If-Range、Accept-Ranges、206、Content-Range 和 416，并限制恶意多范围请求的资源消耗。
        tags: [Range, '206', Resume]
        status: planned
        link: https://www.rfc-editor.org/rfc/rfc9110#section-14
      - type: node
        id: test-cache-behavior
        title: 用时间线验证缓存行为
        description: 记录首次请求、命中、新鲜度过期、重新验证和内容更新后的报文，证明浏览器或代理未复用错误响应。
        tags: [缓存测试, 实践]
        status: planned

  - type: node
    id: manage-state-and-browser-boundaries
    title: 管理身份状态与浏览器边界
    description: 在 HTTP 无状态模型上安全传递会话和认证信息，并正确处理同源策略、CORS 与中间节点。
    tags: [Cookie, Authentication, CORS]
    status: planned
    children:
      - type: node
        id: handle-cookies
        title: 设置最小范围的 Cookie
        description: 理解 Set-Cookie 与 Cookie 的方向，限制 Domain、Path 和生命周期，并根据场景设置 Secure、HttpOnly 与 SameSite。
        tags: [Cookie, SameSite, Session]
        status: planned
        link: https://www.rfc-editor.org/rfc/rfc6265
      - type: node
        id: apply-http-authentication
        title: 理解 HTTP 认证框架
        description: 识别 WWW-Authenticate、Authorization、401 与代理认证的交互，把具体方案的凭据保护和授权校验交给成熟实现。
        tags: [Authorization, Challenge, '401']
        status: planned
      - type: node
        id: protect-credentials
        title: 控制凭据传播范围
        description: 不把令牌放入 URL，限制日志记录、重定向和代理转发中的凭据暴露，并在跨源请求中显式决定是否携带凭据。
        tags: [Credentials, Token, Privacy]
        status: planned
      - type: node
        id: explain-origin-boundaries
        title: 解释源与同源策略
        description: 用 scheme、host 和 port 判断两个 URL 是否同源，区分浏览器读取响应的限制与服务器实际收到请求。
        tags: [Origin, Same-Origin Policy]
        status: planned
      - type: node
        id: configure-cors
        title: 按最小权限配置 CORS
        description: 处理简单请求、预检、允许来源、方法、字段、暴露字段和凭据，动态回显来源时同步设置 Vary。
        tags: [CORS, Preflight, Origin]
        status: planned
        link: https://fetch.spec.whatwg.org/#http-cors-protocol
      - type: node
        id: reason-about-intermediaries
        title: 验证反向代理与网关行为
        description: 明确可信代理边界，规范化 Forwarded 或供应商字段，并测试主机、协议、客户端地址和连接字段的重写规则。
        tags: [Reverse Proxy, Forwarded, Gateway]
        status: planned
        link: https://www.rfc-editor.org/rfc/rfc7239

  - type: node
    id: secure-http-communication
    title: 加固 HTTP 通信与解析边界
    description: 使用 HTTPS、严格解析、输入限制和安全响应策略保护机密性、完整性与服务可用性。
    tags: [HTTPS, TLS, HTTP Security]
    status: planned
    children:
      - type: node
        id: deploy-https
        title: 部署并验证 HTTPS
        description: 获取受信任证书，完成主机名和证书链验证，自动续期，并确认所有客户端拒绝无效证书。
        tags: [HTTPS, Certificate, PKI]
        status: planned
        link: https://www.rfc-editor.org/rfc/rfc8446
      - type: node
        id: enforce-https
        title: 消除明文降级与混合内容
        description: 将 HTTP 安全重定向到 HTTPS，在全站覆盖并评估子域后启用 HSTS，避免页面通过明文加载子资源。
        tags: [HSTS, Mixed Content, Redirect]
        status: planned
        link: https://www.rfc-editor.org/rfc/rfc6797
      - type: node
        id: set-security-headers
        title: 配置浏览器安全响应字段
        description: 根据页面能力设置 CSP、X-Content-Type-Options、Referrer-Policy 和防嵌入策略，并用测试确认未破坏必要功能。
        tags: [CSP, nosniff, Referrer-Policy]
        status: planned
        link: https://cheatsheetseries.owasp.org/cheatsheets/HTTP_Headers_Cheat_Sheet.html
      - type: node
        id: limit-untrusted-input
        title: 限制请求行、字段与内容
        description: 对 URI、字段数量和大小、内容长度、解析深度、上传和处理时间设置上限，尽早拒绝不支持的媒体类型与方法。
        tags: [Input Limits, Timeout, DoS]
        status: planned
      - type: node
        id: prevent-message-desynchronization
        title: 防止消息走私与响应拆分
        description: 严格拒绝含糊的消息边界和非法换行，确保代理链对 framing 的解释一致，并避免把未净化输入写入响应字段。
        tags: [Request Smuggling, Response Splitting, Framing]
        status: planned
        link: https://www.rfc-editor.org/rfc/rfc9112#section-11
      - type: node
        id: minimize-response-exposure
        title: 最小化响应与日志暴露
        description: 不返回堆栈、内部路径或多余标识，脱敏记录字段与内容，并为错误响应保留可关联但不可猜测的请求标识。
        tags: [Data Minimization, Logging, Error Handling]
        status: planned
      - type: roadmap
        roadmapId: api-security-best-practices
        title: 深入 API 安全实践
        description: 构建对外 HTTP API 时，继续学习认证授权、令牌、输入处理、速率限制与持续安全验证。

  - type: node
    id: compare-http-versions
    title: 比较 HTTP/1.1、HTTP/2 与 HTTP/3
    description: 在保持相同 HTTP 语义的前提下，理解三种版本的 framing、连接、并发、压缩和部署取舍。
    tags: [HTTP/1.1, HTTP/2, HTTP/3]
    status: planned
    children:
      - type: node
        id: identify-http1-bottlenecks
        title: 识别 HTTP/1.1 并发限制
        description: 解释顺序响应、流水线局限和多连接成本，并通过请求瀑布观察连接复用与队头阻塞。
        tags: [Connection, Pipelining, Head-of-Line Blocking]
        status: planned
      - type: node
        id: inspect-http2-frames
        title: 阅读 HTTP/2 帧与流
        description: 识别连接前言、SETTINGS、HEADERS、DATA、流状态和伪字段，理解多个流如何共享一条 TCP 连接。
        tags: [Frame, Stream, Multiplexing]
        status: planned
        link: https://www.rfc-editor.org/rfc/rfc9113
      - type: node
        id: explain-hpack-flow-control
        title: 解释 HPACK 与流量控制
        description: 说明字段压缩状态、连接级与流级窗口的作用，并识别压缩上下文和错误实现带来的风险。
        tags: [HPACK, Flow Control]
        status: planned
      - type: node
        id: inspect-http3-over-quic
        title: 追踪基于 QUIC 的 HTTP/3
        description: 理解 QUIC 在 UDP 之上集成安全握手、多路流和连接迁移，以及它如何减少跨流队头阻塞。
        tags: [QUIC, UDP, Stream]
        status: planned
        link: https://www.rfc-editor.org/rfc/rfc9114
      - type: node
        id: understand-qpack
        title: 理解 QPACK 的压缩取舍
        description: 说明 HTTP/3 如何在乱序流上压缩字段，并识别动态表依赖可能引入的阻塞与资源上限。
        tags: [QPACK, Header Compression]
        status: optional
        link: https://www.rfc-editor.org/rfc/rfc9204
      - type: node
        id: negotiate-protocol-version
        title: 验证协议协商与回退
        description: 检查 TLS ALPN、Alt-Svc 和客户端能力如何选择协议，确保 UDP 不可用或协商失败时仍能可靠回退。
        tags: [ALPN, Alt-Svc, Fallback]
        status: planned
      - type: node
        id: optimize-with-measurement
        title: 基于测量优化 HTTP 交付
        description: 用延迟、吞吐、连接复用、缓存命中和压缩收益评估版本与资源策略，不照搬 HTTP/1.1 时代的合并技巧。
        tags: [Performance, Waterfall, Metrics]
        status: planned
      - type: roadmap
        roadmapId: frontend-performance-best-practices
        title: 深入浏览器端 HTTP 性能
        description: 若目标是页面加载体验，继续学习资源优先级、缓存、压缩、CDN 与关键渲染路径。

  - type: node
    id: test-and-troubleshoot-http
    title: 用证据测试并排查 HTTP
    description: 组合命令行、浏览器、代理、服务日志和抓包，在请求时间线上定位语义、缓存、连接与安全问题。
    tags: [curl, DevTools, Observability]
    status: planned
    children:
      - type: node
        id: inspect-with-curl
        title: 使用 curl 构造可复现请求
        description: 显式设置方法、字段、内容、Cookie、证书和协议版本，保存详细时间与响应元数据以复现问题。
        tags: [curl, Reproduction]
        status: planned
        link: https://curl.se/docs/manual.html
      - type: node
        id: inspect-browser-network
        title: 使用浏览器 Network 面板
        description: 检查请求瀑布、协议、缓存来源、重定向、Cookie、CORS、优先级和 timing，导出 HAR 时先清理敏感数据。
        tags: [DevTools, HAR, Waterfall]
        status: planned
      - type: node
        id: use-debugging-proxy
        title: 在授权环境使用调试代理
        description: 捕获和重放客户端与服务器之间的消息，验证代理改写与异常输入处理，并保护测试证书和采集到的凭据。
        tags: [Proxy, Replay, TLS]
        status: optional
      - type: node
        id: correlate-network-events
        title: 关联 DNS、连接、TLS 与 HTTP 事件
        description: 将名称解析、握手、请求发送、首字节、内容下载和连接关闭放在同一时间线，避免把下层故障误判为状态码问题。
        tags: [Timing, DNS, TLS]
        status: planned
      - type: node
        id: instrument-http-services
        title: 为 HTTP 服务建立可观测性
        description: 记录方法、路由模板、状态码、时延、响应大小和请求标识，使用指标、日志与追踪关联上下游且不记录敏感内容。
        tags: [Metrics, Logs, Traces]
        status: planned
      - type: node
        id: automate-protocol-tests
        title: 自动化协议与契约测试
        description: 覆盖方法、状态、字段、内容类型、缓存、条件请求、重定向、CORS、超时和异常消息，避免只测试成功响应体。
        tags: [Integration Test, Contract Test]
        status: planned
      - type: node
        id: write-http-incident-note
        title: 编写可复查的 HTTP 故障记录
        description: 保存脱敏请求、响应、时间线、代理拓扑、协议版本、已排除假设、根因和修复验证，使他人能够重复结论。
        tags: [Incident, Evidence, Documentation]
        status: planned

  - type: node
    id: deliver-http-capstone
    title: 交付一个可验证的 HTTP 综合项目
    description: 构建并评审一个同时覆盖语义、缓存、安全、性能和故障处理的最小客户端与服务端系统。
    tags: [综合项目, Client, Server]
    status: planned
    children:
      - type: node
        id: define-capstone-contract
        title: 定义资源与消息契约
        description: 为静态资源和可修改资源写出 URI、方法、状态码、媒体类型、错误格式及并发更新规则。
        tags: [Contract, URI, Semantics]
        status: planned
      - type: node
        id: implement-capstone-server
        title: 实现符合语义的服务端
        description: 提供 GET、HEAD 和至少一种状态变更操作，实现内容协商、压缩、条件请求、缓存策略与范围响应。
        tags: [Server, Cache, Range]
        status: planned
      - type: node
        id: implement-capstone-client
        title: 实现有边界的客户端
        description: 设置连接与请求超时，处理重定向、流式内容、取消、缓存验证和按语义重试，并限制响应大小。
        tags: [Client, Timeout, Retry]
        status: planned
      - type: node
        id: secure-capstone
        title: 加固传输与输入边界
        description: 启用本地可信 HTTPS，限制请求大小和处理时间，保护 Cookie 或令牌，验证 CORS 和代理信任配置。
        tags: [HTTPS, Security, Limits]
        status: planned
      - type: node
        id: verify-capstone
        title: 用自动化测试和故障注入验收
        description: 测试正常、陈旧缓存、并发冲突、部分传输、慢响应、断连、重试和非法 framing，并记录可观察证据。
        tags: [Testing, Fault Injection, Observability]
        status: planned
      - type: node
        id: review-capstone-tradeoffs
        title: 评审协议取舍与改进方向
        description: 用抓包、瀑布图、指标和安全检查解释实现选择，列出代理部署、HTTP/2 或 HTTP/3 下需要重新验证的假设。
        tags: [Review, Performance, Security]
        status: planned
